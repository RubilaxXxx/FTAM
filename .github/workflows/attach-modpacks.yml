name: Build and Attach Modpacks to Release

on:
    release:
        types: [published]

permissions:
    contents: write

jobs:
    build-and-attach:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            # -------- SETUP --------

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"

            - name: Install Packwiz
              run: |
                  go install github.com/packwiz/packwiz@latest

            # -------- VERSION --------

            - name: Read release tag
              id: version
              run: |
                  TAG="${{ github.event.release.tag_name }}"
                  echo "tag=$TAG" >> $GITHUB_OUTPUT

            # -------- EXPORT CLIENT PACKS --------

            - name: Export CurseForge client pack
              run: |
                  packwiz curseforge export \
                    --output ftam-reloaded-${{ steps.version.outputs.tag }}-curseforge.zip

            - name: Export Modrinth client pack
              run: |
                  packwiz modrinth export \
                    --output ftam-reloaded-${{ steps.version.outputs.tag }}-modrinth.zip

            # -------- SANITY CHECK --------

            - name: List generated files
              run: |
                  ls -lh *.zip

            # -------- UPLOAD TO RELEASE --------

            - name: Upload packs to release.
              run: |
                  gh release upload \
                    "${{ github.event.release.tag_name }}" \
                    ftam-reloaded-${{ steps.version.outputs.tag }}-curseforge.zip \
                    ftam-reloaded-${{ steps.version.outputs.tag }}-modrinth.zip
              env:
                  GITHUB_TOKEN: ${{ github.token }}
